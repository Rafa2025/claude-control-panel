<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4906F"/>
      <stop offset="1" stop-color="#C25E3F"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#7a2f18" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- rounded tile -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>
  <!-- subtle top sheen -->
  <rect x="16" y="16" width="480" height="240" rx="112" fill="#ffffff" opacity="0.07"/>

  <!-- three control sliders (control-panel motif) -->
  <g filter="url(#soft)">
    <!-- track 1 -->
    <rect x="118" y="168" width="276" height="26" rx="13" fill="#FBEFE7" opacity="0.55"/>
    <circle cx="330" cy="181" r="30" fill="#FFF7F1"/>
    <circle cx="330" cy="181" r="14" fill="#C25E3F"/>

    <!-- track 2 -->
    <rect x="118" y="256" width="276" height="26" rx="13" fill="#FBEFE7" opacity="0.55"/>
    <circle cx="196" cy="269" r="30" fill="#FFF7F1"/>
    <circle cx="196" cy="269" r="14" fill="#C25E3F"/>

    <!-- track 3 -->
    <rect x="118" y="344" width="276" height="26" rx="13" fill="#FBEFE7" opacity="0.55"/>
    <circle cx="286" cy="357" r="30" fill="#FFF7F1"/>
    <circle cx="286" cy="357" r="14" fill="#C25E3F"/>
  </g>

  <!-- Claude sparkle mark -->
  <g transform="translate(392 120)" fill="#FFF7F1">
    <path d="M0 -34 C4 -12 12 -4 34 0 C12 4 4 12 0 34 C-4 12 -12 4 -34 0 C-12 -4 -4 -12 0 -34 Z"/>
  </g>
</svg>
